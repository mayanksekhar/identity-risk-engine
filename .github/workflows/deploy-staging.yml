name: Deploy - Staging

on:
  push:
    branches:
      - staging

permissions:
  contents: read
  packages: read
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Deploy to EKS staging namespace
  # Uses the SHA-tagged image from the CI pipeline that ran on the PR
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      image-ref: ${{ steps.image-ref.outputs.ref }}
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Resolve image ref
        id: image-ref
        run: |
          # For staging: use the :develop branch tag which always points to
          # the latest image built from the develop branch by CI.
          # For production: the workflow_dispatch input requires an explicit digest.
          REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop"
          echo "ref=${REF}" >> $GITHUB_OUTPUT
          echo "Deploying: ${REF}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig for EKS staging
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ${{ secrets.AWS_REGION }}

      - name: Deploy to staging namespace
        run: |
          kubectl set image deployment/identity-risk-engine \
            identity-risk-engine=${{ steps.image-ref.outputs.ref }} \
            -n staging
          kubectl rollout status deployment/identity-risk-engine -n staging --timeout=120s

  # ---------------------------------------------------------------------------
  # Job 2: Smoke test - healthz + readyz must respond 200 before any gate
  # ---------------------------------------------------------------------------
  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    environment: staging
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ${{ secrets.AWS_REGION }}

      - name: Get ALB URL
        id: svc
        run: |
          echo "url=http://ire-alb-1051030364.us-east-1.elb.amazonaws.com" >> $GITHUB_OUTPUT
          echo "Smoke testing: http://ire-alb-1051030364.us-east-1.elb.amazonaws.com"

      - name: Health check - /healthz
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ steps.svc.outputs.url }}/healthz)
            if [ "$STATUS" = "200" ]; then
              echo "healthz OK"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "healthz failed after 10 attempts"
          exit 1

      - name: Readiness check - /readyz
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ steps.svc.outputs.url }}/readyz)
          [ "$STATUS" = "200" ] || (echo "readyz returned $STATUS" && exit 1)

      - name: API check - /api/v1/summary
        run: |
          RESP=$(curl -s ${{ steps.svc.outputs.url }}/api/v1/summary)
          echo "$RESP" | grep -q "total_identities" || (echo "API check failed: $RESP" && exit 1)
          echo "API check OK"

  # ---------------------------------------------------------------------------
  # Job 3: Post-deploy SBOM rescan - scan the live image in staging
  # Catches any drift between build time and deploy time
  # ---------------------------------------------------------------------------
  post-deploy-sbom:
    name: Post-deploy SBOM rescan
    runs-on: ubuntu-latest
    needs: [smoke-test, deploy-staging]
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Rescan deployed image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.deploy-staging.outputs.image-ref }}
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table

      - name: Rescan with Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          grype ${{ needs.deploy-staging.outputs.image-ref }} --fail-on high -o table

  # ---------------------------------------------------------------------------
  # Job 4: Kyverno gate - verify image has valid Cosign signature + SBOM
  # attestation before allowing production promotion. This is the policy
  # enforcement layer that ensures nothing bypassed the CI gate.
  # ---------------------------------------------------------------------------
  kyverno-gate:
    name: Kyverno signature gate
    runs-on: ubuntu-latest
    needs: [post-deploy-sbom, deploy-staging]
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify image signature (keyless)
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            ${{ needs.deploy-staging.outputs.image-ref }}
          echo "Signature verification passed"

      - name: Verify SBOM attestation exists
        run: |
          cosign verify-attestation \
            --type cyclonedx \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            ${{ needs.deploy-staging.outputs.image-ref }} \
            | jq '.payload | @base64d | fromjson | .predicateType'
          echo "SBOM attestation verification passed"

      - name: Install Kyverno CLI
        uses: kyverno/action-install-cli@v0.2.0
        with:
          release: v1.18.1

      - name: Apply Kyverno image policy check
        run: |
          kyverno apply deploy/k8s/kyverno-policy.yaml \
            --resource deploy/k8s/deployment.yaml
          echo "Kyverno policy gate passed - image approved for production"
