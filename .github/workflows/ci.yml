name: CI

on:
  push:
    branches:
      - 'feature/**'
      - develop
  pull_request:
    branches:
      - staging
      - main

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write
  attestations: write

jobs:
  security-pipeline:
    uses: mayanksekhar/thinkwerke-sbom-pipeline/.github/workflows/security-pipeline.yml@v1
    with:
      language: go
      go-version: '1.26.4'
      severity-threshold: high
    secrets: inherit
