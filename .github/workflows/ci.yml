name: CI - Security-Gated Build Pipeline

on:
  push:
    branches:
      - 'feature/**'
      - develop
  pull_request:
    branches:
      - staging
      - main

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  GO_VERSION: '1.26.4'

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Gitleaks - secret detection, runs first, blocks everything if fails
  # ---------------------------------------------------------------------------
  gitleaks:
    name: Secret scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Job 2: SAST + SCA - Semgrep static analysis + Trivy filesystem scan
  # Runs in parallel with gitleaks since both are source-only scans
  # ---------------------------------------------------------------------------
  sast-sca:
    name: SAST + SCA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          exit-code: '1'
          format: sarif
          output: trivy-fs-results.sarif

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-fs

  # ---------------------------------------------------------------------------
  # Job 3: Build and test - go vet, go test, compile
  # ---------------------------------------------------------------------------
  build-test:
    name: Build + test
    runs-on: ubuntu-latest
    needs: [gitleaks, sast-sca]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod tidy

      - name: Vet
        run: go vet ./...

      - name: Test with coverage
        run: go test ./... -v -coverprofile=coverage.out

      - name: Coverage report
        run: go tool cover -func=coverage.out

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
          go build -ldflags "-s -w -X main.version=${{ github.sha }}" \
          -o identity-risk-engine ./cmd/server

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: identity-risk-engine-binary
          path: identity-risk-engine
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job 4: Source SBOM (Level 1) - Syft on source dir before image build
  # This is the "what did we intend to ship" baseline SBOM
  # ---------------------------------------------------------------------------
  source-sbom:
    name: Source SBOM (L1)
    runs-on: ubuntu-latest
    needs: [build-test]
    steps:
      - uses: actions/checkout@v4

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate source SBOM (CycloneDX)
        run: syft dir:. -o cyclonedx-json=sbom-source.cdx.json

      - name: Generate source SBOM (SPDX)
        run: syft dir:. -o spdx-json=sbom-source.spdx.json

      - name: Scan source SBOM with Grype
        id: grype-source
        uses: anchore/scan-action@v4
        with:
          sbom: sbom-source.cdx.json
          fail-build: true
          severity-cutoff: high
          output-format: table

      - name: Upload source SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: sbom-source
          path: |
            sbom-source.cdx.json
            sbom-source.spdx.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 5: Build container image + push to GHCR
  # Tagged by git SHA and image digest - never a floating tag in production
  # ---------------------------------------------------------------------------
  image-build:
    name: Build + push image
    runs-on: ubuntu-latest
    needs: [source-sbom]
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
      image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=ref,event=pr

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  # ---------------------------------------------------------------------------
  # Job 6: Image SBOM (Level 2) + dual vulnerability gate
  # Syft scans the pushed image - includes OS layer, not just go.mod deps
  # Grype consumes the SBOM; Trivy scans the image independently
  # Both must pass to proceed - dual gate for cross-validation
  # ---------------------------------------------------------------------------
  image-sbom-gate:
    name: Image SBOM + vuln gate (L2)
    runs-on: ubuntu-latest
    needs: [image-build]
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ needs.image-build.outputs.image-ref }}
          format: cyclonedx-json
          output-file: sbom-image.cdx.json

      - name: Grype gate - scan image SBOM
        uses: anchore/scan-action@v4
        with:
          sbom: sbom-image.cdx.json
          fail-build: true
          severity-cutoff: high
          output-format: table

      - name: Trivy image gate - independent cross-check
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.image-build.outputs.image-ref }}
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: sarif
          output: trivy-image-results.sarif

      - name: Upload Trivy image SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image

      - name: Upload image SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-image
          path: sbom-image.cdx.json
          retention-days: 90

  # ---------------------------------------------------------------------------
  # Job 7: Cosign keyless signing + SLSA provenance
  # Both run together since both need the image digest and both are attestations
  # Cosign: short-lived cert from Fulcio via GitHub OIDC, logged to Rekor
  # SLSA: L3 provenance via slsa-github-generator (separate reusable workflow)
  # ---------------------------------------------------------------------------
  sign-attest:
    name: Sign + SLSA provenance
    runs-on: ubuntu-latest
    needs: [image-sbom-gate]
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Download image SBOM attestation
        uses: actions/download-artifact@v4
        with:
          name: sbom-image

      - name: Sign image (keyless via GitHub OIDC)
        run: |
          cosign sign --yes \
            ${{ needs.image-build.outputs.image-ref }}

      - name: Attest SBOM to image
        run: |
          cosign attest --yes \
            --predicate sbom-image.cdx.json \
            --type cyclonedx \
            ${{ needs.image-build.outputs.image-ref }}

      - name: Attest build provenance via GitHub
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ needs.image-build.outputs.image-digest }}
          push-to-registry: true

      - name: Verify signature
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            ${{ needs.image-build.outputs.image-ref }}
