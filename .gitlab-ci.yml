# GitLab CI pipeline for identity-risk-engine
# Thinkwerke DevSecOps portfolio - Project 3 ("Prevent")
#
# This pipeline automates the exact manual sequence already verified by hand
# on son-of-anton: build -> test -> source scan -> source SBOM -> image build
# -> image SBOM -> vuln gate (Grype + Trivy) -> keyless sign + attest (Cosign)
# -> gated deploy.
#
# Plain ASCII only in this file - unicode box-drawing characters break
# GitLab's YAML parser (learned the hard way on Project 1).

stages:
  - build
  - source-scan
  - source-sbom
  - image-build
  - image-scan
  - sign-attest
  - deploy
  - scheduled-rescan

variables:
  GO_VERSION: "1.26.4"
  APP_NAME: "identity-risk-engine"
  IMAGE_TAG: "$CI_REGISTRY_IMAGE/${APP_NAME}:$CI_COMMIT_SHORT_SHA"
  IMAGE_TAG_LATEST: "$CI_REGISTRY_IMAGE/${APP_NAME}:latest"
  TRIVY_VERSION: "0.69.3"
  GOFLAGS: "-mod=mod"

# ---------------------------------------------------------------------------
# STAGE 0 (mapped to GitLab stage "build"): compile + unit test
# Mirrors: go mod tidy && go vet ./... && go test ./... -v
# ---------------------------------------------------------------------------
build:
  stage: build
  image: golang:${GO_VERSION}-bookworm
  script:
    - go mod tidy
    - go vet ./...
    - go test ./... -v -coverprofile=coverage.out
    - go tool cover -func=coverage.out
    - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "-s -w -X main.version=$CI_COMMIT_SHORT_SHA" -o identity-risk-engine ./cmd/server
  artifacts:
    paths:
      - identity-risk-engine
      - coverage.out
    expire_in: 1 hour
  tags:
    - devsecops

# ---------------------------------------------------------------------------
# STAGE 1: source-level scanning (SAST + fs vuln/secret scan)
# Mirrors: semgrep --config auto . / trivy fs --scanners vuln,secret,misconfig .
# Both jobs run in parallel within the same GitLab stage.
# ---------------------------------------------------------------------------
sast:
  stage: source-scan
  image: returntocorp/semgrep
  script:
    - semgrep scan --config=auto --json --output=semgrep-results.json .
    - semgrep scan --config=auto .
  artifacts:
    paths:
      - semgrep-results.json
    expire_in: 1 week
  tags:
    - devsecops

source-fs-scan:
  stage: source-scan
  image:
    name: aquasec/trivy:${TRIVY_VERSION}
    entrypoint: [""]
  script:
    - trivy fs --scanners vuln,secret,misconfig . --severity HIGH,CRITICAL --exit-code 1 --format table
  tags:
    - devsecops

# ---------------------------------------------------------------------------
# STAGE 2: source SBOM (baseline, informational, not gated)
# Mirrors: syft dir:. -o cyclonedx-json=sbom-source.cdx.json
# ---------------------------------------------------------------------------
source-sbom:
  stage: source-sbom
  image:
    name: anchore/syft:debug
    entrypoint: [""]
  script:
    - /syft dir:. -o cyclonedx-json=sbom-source.cdx.json
    - /syft dir:. -o spdx-json=sbom-source.spdx.json
  artifacts:
    paths:
      - sbom-source.cdx.json
      - sbom-source.spdx.json
    expire_in: 1 week
  tags:
    - devsecops

# ---------------------------------------------------------------------------
# STAGE 3: build the container image
# Mirrors: docker build --build-arg VERSION=$VERSION -t identity-risk-engine:$VERSION .
# Pushed to the GitLab Container Registry so later stages (SBOM, sign, attest,
# deploy) all reference the same immutable digest.
# ---------------------------------------------------------------------------
image-build:
  stage: image-build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build --build-arg VERSION=$CI_COMMIT_SHORT_SHA -t "$IMAGE_TAG" -t "$IMAGE_TAG_LATEST" .
    - docker push "$IMAGE_TAG"
    - docker push "$IMAGE_TAG_LATEST"
  tags:
    - devsecops

# ---------------------------------------------------------------------------
# STAGE 4: image SBOM + vulnerability gate
# Mirrors:
#   syft <image> -o cyclonedx-json=sbom-image.cdx.json
#   grype sbom:sbom-image.cdx.json --fail-on high
#   trivy image <image> --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed
# This is the real gate. Either job failing blocks sign-attest and deploy.
# ---------------------------------------------------------------------------
image-sbom:
  stage: image-scan
  image:
    name: anchore/syft:debug
    entrypoint: [""]
  needs:
    - image-build
  variables:
    SYFT_REGISTRY_AUTH_USERNAME: "$CI_REGISTRY_USER"
    SYFT_REGISTRY_AUTH_PASSWORD: "$CI_REGISTRY_PASSWORD"
  script:
    - /syft "$IMAGE_TAG" -o cyclonedx-json=sbom-image.cdx.json
  artifacts:
    paths:
      - sbom-image.cdx.json
    expire_in: 1 month
  tags:
    - devsecops

grype-gate:
  stage: image-scan
  image:
    name: anchore/grype:debug
    entrypoint: [""]
  needs:
    - job: image-sbom
      artifacts: true
  script:
    - /grype sbom:sbom-image.cdx.json --fail-on high -o table
  tags:
    - devsecops

trivy-image-gate:
  stage: image-scan
  image:
    name: aquasec/trivy:${TRIVY_VERSION}
    entrypoint: [""]
  needs:
    - image-build
  before_script:
    - trivy image --download-db-only
    - mkdir -p ~/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"auth\":\"$(printf '%s' "$CI_REGISTRY_USER:$CI_REGISTRY_PASSWORD" | base64 -w0)\"}}}" > ~/.docker/config.json
  script:
    - trivy image "$IMAGE_TAG" --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed --format table
  tags:
    - devsecops

# ---------------------------------------------------------------------------
# STAGE 5: sign the image and attest the SBOM (keyless, via GitLab OIDC)
# Mirrors the manual cosign sign / cosign attest steps, but with no static
# private key. GitLab issues a short-lived OIDC ID token (id_tokens block
# below); Cosign exchanges that with Sigstore's Fulcio CA for a short-lived
# signing certificate, and the signature/attestation is logged to the public
# Rekor transparency log. Nothing secret is stored in CI variables.
# ---------------------------------------------------------------------------
sign-attest:
  stage: sign-attest
  image: alpine:latest
  id_tokens:
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  needs:
    - job: image-sbom
      artifacts: true
    - job: grype-gate
    - job: trivy-image-gate
  before_script:
    - apk add --no-cache --update cosign docker-cli
  script:
    - cosign login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - cosign sign --yes "$IMAGE_TAG"
    - cosign attest --yes --predicate sbom-image.cdx.json --type cyclonedx "$IMAGE_TAG"
    - cosign verify --certificate-identity-regexp ".*" --certificate-oidc-issuer-regexp ".*" "$IMAGE_TAG" || true
  tags:
    - devsecops

# ---------------------------------------------------------------------------
# STAGE 6: gated deploy - only runs if everything above passed
# Actual EKS/ECS weighted-target-group deploy logic lives in deploy/terraform
# and deploy/k8s; this job applies them. Manual trigger by default so cloud
# spend only happens when you intend it to (consistent with the
# demo-first-teardown pattern from Project 1).
# ---------------------------------------------------------------------------
deploy-apply:
  stage: deploy
  image: hashicorp/terraform:1.9
  needs:
    - sign-attest
  when: manual
  script:
    - echo "Deploy stage placeholder - see deploy/terraform for the EKS/ECS weighted-ALB apply"
    - echo "Intentionally manual - cloud resources are ephemeral, stood up for demo and torn down after"
  tags:
    - devsecops

# ---------------------------------------------------------------------------
# STAGE 7 (scheduled pipeline only): registry re-scan
# Mirrors: trivy image <pushed image> --severity HIGH,CRITICAL (run on a cron
# trigger, not on every push - catches CVEs disclosed after the original build)
# ---------------------------------------------------------------------------
scheduled-rescan:
  stage: scheduled-rescan
  image:
    name: aquasec/trivy:${TRIVY_VERSION}
    entrypoint: [""]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  script:
    - trivy image "$IMAGE_TAG_LATEST" --severity HIGH,CRITICAL --format table
  tags:
    - devsecops
