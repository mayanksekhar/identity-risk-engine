apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-risk-engine
  labels:
    app.kubernetes.io/name: identity-risk-engine
    app.kubernetes.io/version: "latest"
    app.kubernetes.io/component: api
    app.kubernetes.io/managed-by: kubectl
    thinkwerke.com/project: identity-risk-engine
  annotations:
    # Image digest is set at deploy time by the CI pipeline via:
    # kubectl set image deployment/identity-risk-engine identity-risk-engine=<image>@<digest>
    # The Kyverno policy enforces that only digest-referenced, signed images
    # are admitted to this deployment in the production namespace.
    thinkwerke.com/sbom-attested: "true"
    thinkwerke.com/cosign-signed: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: identity-risk-engine
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: identity-risk-engine
        app.kubernetes.io/component: api
        thinkwerke.com/project: identity-risk-engine
      annotations:
        # Force pod restart when configmap changes
        checksum/config: "placeholder-updated-by-helm-or-kustomize"
    spec:
      serviceAccountName: identity-risk-engine
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: identity-risk-engine
          # Image is set at deploy time by CI pipeline - never hardcoded here.
          # Format: ghcr.io/mayanksekhar/identity-risk-engine@sha256:<digest>
          image: ghcr.io/mayanksekhar/identity-risk-engine:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: identity-risk-engine-config
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: identity-risk-engine
  labels:
    app.kubernetes.io/name: identity-risk-engine
    thinkwerke.com/project: identity-risk-engine
  annotations:
    # IAM role annotation added by Terraform at cluster setup time
    # eks.amazonaws.com/role-arn: arn:aws:iam::<account>:role/identity-risk-engine
